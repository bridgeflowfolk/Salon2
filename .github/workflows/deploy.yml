# ════════════════════════════════════════════════════════════════
# deploy.yml — Build 11ty + Deploy GitHub Pages
# Déclenché sur chaque push sur main (y compris les commits du CMS)
# ════════════════════════════════════════════════════════════════

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # permet de lancer manuellement depuis GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois, annule les runs en attente
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build 11ty
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
